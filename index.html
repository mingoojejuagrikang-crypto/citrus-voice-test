<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>감귤조사 v5 - 피드백 로그 음성인식</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--bg:#10140f;--sf:#172018;--sf2:#223126;--bd:#344a38;--ac:#ff9d2e;--gn:#21b56b;--rd:#e34848;--bl:#4f8df7;--tx:#f4f7f1;--txd:#b8c3b1;--txm:#7b8977}
  body{font-family:'Noto Sans KR',-apple-system,'Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;overflow-x:hidden}
  .app{max-width:520px;margin:0 auto;padding:12px;min-height:100dvh;display:flex;flex-direction:column}
  .hdr{text-align:center;padding:8px 0;border-bottom:1px solid var(--bd);margin-bottom:8px}
  .hdr h1{font-size:18px;font-weight:900;color:var(--ac)}
  .hdr .ver{font-size:11px;color:var(--txd);margin-top:2px}
  .panel{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:10px;margin-bottom:8px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  label{display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--txm);font-weight:700}
  select,input{width:100%;border:1px solid var(--bd);border-radius:8px;background:var(--sf2);color:var(--tx);font:inherit;font-size:13px;padding:9px}
  .model-status{padding:10px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;margin-bottom:8px;font-size:12px;color:var(--txd);line-height:1.45}
  .model-status.loading{border-color:var(--ac)}
  .model-status.ready{border-color:var(--gn)}
  .model-status.error{border-color:var(--rd)}
  .prog-bar{height:4px;background:var(--sf2);border-radius:2px;margin-top:6px;overflow:hidden}
  .prog-fill{height:100%;background:var(--ac);border-radius:2px;transition:width .3s;width:0%}
  .status{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--sf);border-radius:8px;margin-bottom:8px;font-size:12px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--txm);flex-shrink:0}
  .dot.listen{background:var(--ac);animation:pulse 1s infinite}
  .dot.proc{background:var(--bl);animation:pulse .5s infinite}
  .dot.ok{background:var(--gn)}
  .dot.err{background:var(--rd)}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(1.35)}}
  .meter{height:7px;background:var(--sf2);border-radius:4px;margin-bottom:8px;overflow:hidden}
  .meter-fill{height:100%;background:var(--gn);border-radius:4px;transition:width 50ms;width:0%}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
  .stat{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:7px 6px;text-align:center}
  .stat b{display:block;color:var(--ac);font-size:13px}
  .stat span{display:block;color:var(--txm);font-size:10px;margin-top:1px}
  .results{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:7px;padding-bottom:76px;-webkit-overflow-scrolling:touch}
  .card{background:var(--sf);border-radius:8px;padding:12px 14px;animation:fadeIn .2s ease-out;border-left:3px solid var(--bd)}
  .card.ok{border-left-color:var(--gn)}
  .card.warn{border-left-color:var(--ac)}
  .card.fail{border-left-color:var(--rd)}
  .card.new{border-left-color:var(--bl)}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .card-raw{font-size:11px;color:var(--txm);margin-bottom:5px;line-height:1.45}
  .card-parsed{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .card-field{font-size:14px;font-weight:900;color:var(--ac)}
  .card-value{font-size:28px;font-weight:900}
  .card-meta{font-size:10px;color:var(--txm);margin-top:5px;line-height:1.45}
  .feedback{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
  .mini{border:1px solid var(--bd);border-radius:8px;background:var(--sf2);color:var(--txd);font-size:11px;font-family:inherit;font-weight:700;padding:6px 8px}
  .empty{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--txm);font-size:13px;line-height:1.8;padding:20px}
  .controls{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--bd);padding:10px;display:flex;justify-content:center;gap:7px;max-width:520px;margin:0 auto;flex-wrap:wrap}
  .btn{padding:11px 12px;border:1px solid var(--bd);border-radius:8px;background:var(--sf);color:var(--txd);font-size:12px;font-family:inherit;font-weight:900;cursor:pointer;min-width:58px}
  .btn:active{background:var(--sf2)}
  .btn.primary{background:var(--ac);color:#111;border-color:var(--ac)}
  .btn.stop{background:var(--rd);color:#fff;border-color:var(--rd)}
  .btn.disabled{opacity:.35;pointer-events:none}
  .toast{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%) scale(.92);background:rgba(0,0,0,.9);color:#fff;padding:16px 28px;border-radius:8px;font-size:20px;font-weight:900;z-index:100;opacity:0;pointer-events:none;transition:all .18s;text-align:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  .toast .tf{color:var(--ac);font-size:14px}
  .toast .tv{font-size:30px;margin-top:2px}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <h1>감귤조사 v5</h1>
    <div class="ver">전문용어 보정 + 피드백 로그 + 빠른/정확 모드</div>
  </div>
  <div class="panel">
    <div class="grid">
      <label>인식 엔진
        <select id="engineSelect" onchange="window.changeEngine(this.value)">
          <option value="webspeech">Web Speech 빠른 모드</option>
          <option value="whisper-tiny">Whisper tiny 비추천</option>
          <option value="whisper-base">Whisper base 비추천</option>
        </select>
      </label>
      <label>VAD 감도
        <select id="modeSelect" onchange="window.changeVadMode(this.value)">
          <option value="fast">빠른 반응</option>
          <option value="accurate">정확 우선</option>
        </select>
      </label>
    </div>
  </div>
  <div class="model-status" id="modelStatus">
    iPhone Safari에서는 Web Speech 빠른 모드를 기본으로 사용하세요. Whisper는 비교용입니다.
    <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
  </div>
  <div class="status">
    <div class="dot ok" id="dot"></div>
    <span id="statusText">시작 대기</span>
  </div>
  <div class="meter"><div class="meter-fill" id="meterFill"></div></div>
  <div class="stats">
    <div class="stat"><b id="statOk">0</b><span>성공</span></div>
    <div class="stat"><b id="statFail">0</b><span>실패</span></div>
    <div class="stat"><b id="statLatency">-</b><span>최근 ms</span></div>
    <div class="stat"><b id="statLogs">0</b><span>로그</span></div>
  </div>
  <div class="results" id="results">
    <div class="empty" id="empty">
      iPhone Safari 기본값은 Web Speech 빠른 모드입니다.<br>
      등록된 항목만 저장하고,<br>
      틀린 결과는 "틀림" 또는 "수정"으로 로그에 남겨주세요.
    </div>
  </div>
</div>
<div class="controls" id="controls">
  <button class="btn" id="btnLoad" onclick="window.loadModel()">모델 로드</button>
  <button class="btn primary" id="btnStart" onclick="window.toggleCapture()">시작</button>
  <button class="btn" onclick="window.downloadLogs('json')">JSON</button>
  <button class="btn" onclick="window.downloadLogs('csv')">CSV</button>
  <button class="btn" onclick="window.clearResults()">초기화</button>
</div>
<div class="toast" id="toast"><div class="tf" id="toastF"></div><div class="tv" id="toastV"></div></div>
<script type="module">
const APP_VERSION = 'v5.1.0-safari-webspeech';
const LOG_KEY = 'citrus_voice_feedback_logs_v5';
const PREF_KEY = 'citrus_voice_prefs_v5';
const MODEL_CONFIGS = {
  'whisper-tiny': {label: 'Whisper tiny', modelId: 'onnx-community/whisper-tiny', dtype: 'q8'},
  'whisper-base': {label: 'Whisper base', modelId: 'onnx-community/whisper-base', dtype: 'q8'},
};
const VAD_MODES = {
  fast: {label: '빠른 반응', silenceMs: 850, minMs: 350, maxMs: 5200, preRollMs: 420},
  accurate: {label: '정확 우선', silenceMs: 1250, minMs: 450, maxMs: 7200, preRollMs: 620},
};
const FIELDS = {
  '조사나무': {type: 'int', range: [1, 100], unit: '번', short: '나무', aliases: ['나무', '나무번호', '조사 나무', '노사 나무', '노사나무', '조사나 무', '좌사나무', '조산나무', '조사나무가', '조사나무는']},
  '조사과실': {type: 'int', range: [1, 50], unit: '번', short: '과실', aliases: ['과실', '과실번호', '조사 과실', '조 과실', '조사과일', '좌사과실', '조산과실', '조사괴실', '조사 가실', '조사가 실', '조사 과제', '과일', '거실', '가실', '마실']},
  '횡경': {type: 'float', range: [10, 120], unit: 'mm', short: '횡', aliases: ['횡', '횡경이', '휑경', '휑경이', '행경', '황경', '왱경', '횡견', '횡겨', '횡격', '횡겸', '형경', '혈경', '흉경', '획경', '횟경', '변경', '생경', '엔', '엔경', '엔 경', '은경', '현경', '인경', '안경']},
  '종경': {type: 'float', range: [10, 120], unit: 'mm', short: '종', aliases: ['종', '종경이', '종견', '종겨', '종격', '종겸', '존경', '정경', '동경', '중경', '총경', '종교', '송경', '용경']},
  '과중': {type: 'float', range: [30, 500], unit: 'g', short: null, aliases: ['과종', '과증', '과준', '괴중', '가중', '과충', '과중이', '무게']},
  '당도': {type: 'float', range: [5, 20], unit: 'Brix', short: null, aliases: ['당두', '당돋', '단도', '당동', '당독', '당또', '당토', '담도', '브릭스']},
  '산도': {type: 'float', range: [0.3, 3.0], unit: '%', short: null, aliases: ['산돋', '산동', '삼도', '선도', '산또', '잔도', '상도']},
  '착색': {type: 'int', range: [1, 10], unit: '', short: null, aliases: ['착생', '착섹', '착쌕', '착색이', '칙색', '탁색']},
  '경도': {type: 'float', range: [0.1, 30], unit: 'N', short: null, aliases: ['경돋', '견도', '겸도', '경독', '껑도', '격도']},
  '과피두께': {type: 'float', range: [0.5, 10], unit: 'mm', short: '과피', aliases: ['과피', '과피두게', '과피두깨', '과피 두께', '꽈피두께', '과피 두게', '과피 두깨', '껍질두께', '피두께']},
  '비타민C': {type: 'float', range: [10, 100], unit: 'mg', short: '비타민', aliases: ['비타민씨', '비타민시', '비타민 씨', '비타민', '비타민c', '피타민씨', '비타민 씨가']},
  '구연산': {type: 'float', range: [0.1, 3.0], unit: '%', short: null, aliases: ['구연삼', '구년산', '구연산이', '귀연산', '구련산', '규연산']},
  '과즙량': {type: 'float', range: [10, 200], unit: 'mL', short: '과즙', aliases: ['과즙', '과즙량이', '과증량', '과즙양', '과즙 양', '즙량']},
  '씨수': {type: 'int', range: [0, 30], unit: '개', short: null, aliases: ['씨수가', '시수', '씨 수', '씨숫', '씨쑤', '씨앗수']},
  '비고': {type: 'text', range: null, unit: '', short: null, aliases: ['비고란', '메모', '참고', '노트', '기타']},
};
const KOREAN_DIGITS = {'영':0,'공':0,'일':1,'이':2,'삼':3,'사':4,'오':5,'육':6,'륙':6,'칠':7,'팔':8,'구':9,'하나':1,'둘':2,'셋':3,'넷':4,'다섯':5,'여섯':6,'일곱':7,'여덟':8,'아홉':9};
const COUNTER_DIGITS = {...KOREAN_DIGITS, '다':4, '라':4, '로':5};
const PARTICLE_RE = /(은|는|이|가|을|를|에|의|으로|로|하고|랑)$/;
const UNIT_RE = /(밀리미터|미리미터|밀리|미리|mm|엠엠|브릭스|brix|퍼센트|프로|그램|그람|g|개|번|ml|미리리터)$/i;
let prefs = loadPrefs();
let engineMode = prefs.engineMode || 'webspeech';
let vadMode = prefs.vadMode || 'fast';
let transcriber = null;
let modelLoaded = false;
let activeModelKey = null;
let audioCtx = null;
let capturing = false;
let audioBuffer = [];
let preRoll = [];
let isVoiceActive = false;
let silenceFrames = 0;
let voiceStartedAt = 0;
let noiseFloor = 0.006;
let vadThreshold = 0.016;
let processingQueue = [];
let isProcessing = false;
let recognition = null;
let restartWebSpeech = false;
let pendingField = null;
let allResults = [];
let feedbackLogs = loadLogs();
let statOk = 0;
let statFail = 0;
let lastLatency = '-';
let ttsBlockedUntil = 0;
document.getElementById('engineSelect').value = engineMode;
document.getElementById('modeSelect').value = vadMode;
syncControls();
updateStats();
function loadPrefs(){try{return JSON.parse(localStorage.getItem(PREF_KEY) || '{}')}catch{return {}}}
function savePrefs(){localStorage.setItem(PREF_KEY, JSON.stringify({engineMode, vadMode}))}
function loadLogs(){try{const parsed = JSON.parse(localStorage.getItem(LOG_KEY) || '[]');return Array.isArray(parsed) ? parsed : []}catch{return []}}
function persistLogs(){feedbackLogs = feedbackLogs.slice(-500);localStorage.setItem(LOG_KEY, JSON.stringify(feedbackLogs));updateStats()}
function createId(){return crypto.randomUUID ? crypto.randomUUID() : 'log-' + Date.now() + '-' + Math.random().toString(16).slice(2)}
function nowIso(){return new Date().toISOString()}
function escapeHtml(value){return String(value ?? '').replace(/[&<>"']/g, (ch) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
function setStatus(type, text){document.getElementById('dot').className = 'dot ' + type;document.getElementById('statusText').textContent = text}
function updateStats(){document.getElementById('statOk').textContent = statOk;document.getElementById('statFail').textContent = statFail;document.getElementById('statLatency').textContent = lastLatency;document.getElementById('statLogs').textContent = feedbackLogs.length}
function syncControls(){
  const loadBtn = document.getElementById('btnLoad');
  const startBtn = document.getElementById('btnStart');
  const status = document.getElementById('modelStatus');
  const needsModel = engineMode.startsWith('whisper');
  loadBtn.style.display = needsModel ? 'inline-block' : 'none';
  startBtn.classList.toggle('disabled', needsModel && !(modelLoaded && activeModelKey === engineMode));
  if (!needsModel) {
    status.className = 'model-status ready';
    status.innerHTML = 'iPhone Safari 기본값입니다. 등록된 항목만 저장하고 피드백 로그를 남깁니다.<div class="prog-bar"><div class="prog-fill" id="progFill" style="width:100%"></div></div>';
    setStatus('ok', 'Web Speech 시작 가능');
  } else if (modelLoaded && activeModelKey === engineMode) {
    const cfg = MODEL_CONFIGS[engineMode];
    status.className = 'model-status ready';
    status.innerHTML = `${cfg.label} 로드 완료. 시작할 수 있습니다.<div class="prog-bar"><div class="prog-fill" id="progFill" style="width:100%"></div></div>`;
  } else {
    const cfg = MODEL_CONFIGS[engineMode];
    status.className = 'model-status';
    status.innerHTML = `${cfg.label} 모델을 먼저 로드하세요. 로드 후 짧은 warm-up을 수행합니다.<div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>`;
  }
}
window.changeEngine = function(next){if (capturing) stopCapture();engineMode = next;savePrefs();syncControls()};
window.changeVadMode = function(next){vadMode = next;savePrefs();setStatus('ok', `${VAD_MODES[vadMode].label} 모드`)};
window.loadModel = async function(){
  if (!engineMode.startsWith('whisper')) return;
  const cfg = MODEL_CONFIGS[engineMode];
  const btn = document.getElementById('btnLoad');
  const status = document.getElementById('modelStatus');
  btn.textContent = '로딩중';
  btn.classList.add('disabled');
  status.className = 'model-status loading';
  status.innerHTML = `${cfg.label} 다운로드/초기화 중입니다.<div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>`;
  const loadStarted = performance.now();
  try{
    const {pipeline, env} = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3');
    env.allowLocalModels = false;
    try{env.backends.onnx.wasm.numThreads = Math.max(1, Math.min(4, navigator.hardwareConcurrency || 1))}catch{}
    transcriber = await pipeline('automatic-speech-recognition', cfg.modelId, {
      dtype: cfg.dtype,
      device: 'wasm',
      progress_callback: (p) => {
        const fill = document.getElementById('progFill');
        if (!fill) return;
        if (p.status === 'progress' && p.total) {
          const pct = Math.round(p.loaded / p.total * 100);
          fill.style.width = pct + '%';
          status.firstChild.textContent = `${cfg.label} ${p.file || 'model'} ${pct}%`;
        }
        if (p.status === 'ready') fill.style.width = '100%';
      },
    });
    setStatus('proc', 'warm-up 중');
    await transcriber(new Float32Array(16000), {language: 'korean', task: 'transcribe', chunk_length_s: 0});
    modelLoaded = true;
    activeModelKey = engineMode;
    btn.textContent = '모델 로드';
    btn.classList.remove('disabled');
    recordSystemLog('model-load', {engineMode, modelId: cfg.modelId, ms: Math.round(performance.now() - loadStarted)});
    syncControls();
    setStatus('ok', `${cfg.label} 준비 완료`);
  }catch(e){
    btn.textContent = '재시도';
    btn.classList.remove('disabled');
    status.className = 'model-status error';
    status.innerHTML = `모델 로드 실패: ${escapeHtml(e.message)}<div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>`;
    recordSystemLog('model-load-error', {engineMode, modelId: cfg.modelId, error: e.message});
    setStatus('err', '모델 로드 실패');
  }
};
window.toggleCapture = async function(){
  if (capturing) {stopCapture();return}
  if (engineMode === 'webspeech') {startWebSpeech();return}
  await startWhisperCapture();
};
function startWebSpeech(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {setStatus('err', '이 브라우저는 Web Speech를 지원하지 않습니다');recordSystemLog('webspeech-unsupported', {userAgent: navigator.userAgent});return}
  recognition = new SpeechRecognition();
  recognition.lang = 'ko-KR';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 5;
  restartWebSpeech = true;
  capturing = true;
  setStartButton(true);
  setStatus('listen', 'Web Speech 듣는 중');
  recordSystemLog('capture-start', {engineMode});
  recognition.onresult = (event) => {
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const result = event.results[i];
      if (!result.isFinal) continue;
      const alternatives = [];
      for (let j = 0; j < result.length; j++) alternatives.push(result[j].transcript.trim());
      const text = alternatives[0] || '';

  downloadBlob(`citrus-voice-feedback-${stamp}.json`, JSON.stringify(feedbackLogs, null, 2), 'application/json;charset=utf-8');
};
function logsToCsv(logs){
  const rows = [['ts','kind','engine','model','rawText','field','value','score','method','status','message','asrMs','parseMs','audioMs','feedback','expectedText']];
  for (const log of logs) rows.push([log.ts, log.kind, log.engine, log.model || '', log.rawText || '', log.parse?.field || '', log.parse?.value ?? '', log.parse?.matchScore ?? '', log.parse?.matchMethod || '', log.status || '', log.message || log.detail?.error || '', log.timing?.asrMs ?? '', log.timing?.parseMs ?? '', log.capture?.audioMs ?? '', log.feedback?.verdict || '', log.feedback?.expectedText || '']);
  return rows.map((row) => row.map(csvCell).join(',')).join('\n');
}
function csvCell(value){const text = String(value ?? '');return /[",\n]/.test(text) ? '"' + text.replace(/"/g, '""') + '"' : text}
function downloadBlob(filename, content, type){const blob = new Blob([content], {type});const url = URL.createObjectURL(blob);const a = document.createElement('a');a.href = url;a.download = filename;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url)}
</script>
