<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>감귤조사 v4 — Whisper</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--bg:#0a0f1a;--sf:#111827;--sf2:#1a2235;--bd:#2a3450;--or:#ff8c21;--gn:#22c55e;--rd:#ef4444;--bl:#3b82f6;--tx:#f1f5f9;--txd:#8892a8;--txm:#4b5568}
  body{font-family:'Noto Sans KR',-apple-system,'Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;overflow-x:hidden}
  .app{max-width:480px;margin:0 auto;padding:12px;min-height:100dvh;display:flex;flex-direction:column}

  /* Header */
  .hdr{text-align:center;padding:8px 0;border-bottom:1px solid var(--bd);margin-bottom:8px}
  .hdr h1{font-size:17px;font-weight:700;color:var(--or)}
  .hdr .ver{font-size:10px;color:var(--txm)}

  /* Model loading */
  .model-status{padding:10px 14px;background:var(--sf);border-radius:10px;margin-bottom:8px;font-size:12px;color:var(--txd)}
  .model-status.loading{border:1px solid var(--or)}
  .model-status.ready{border:1px solid var(--gn)}
  .model-status.error{border:1px solid var(--rd)}
  .prog-bar{height:4px;background:var(--sf2);border-radius:2px;margin-top:6px;overflow:hidden}
  .prog-fill{height:100%;background:var(--or);border-radius:2px;transition:width .3s;width:0%}

  /* Status */
  .status{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--sf);border-radius:8px;margin-bottom:8px;font-size:12px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--txm);flex-shrink:0}
  .dot.listen{background:var(--or);animation:pulse 1s infinite}
  .dot.proc{background:var(--bl);animation:pulse .5s infinite}
  .dot.ok{background:var(--gn)}
  .dot.err{background:var(--rd)}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}

  /* Level meter */
  .meter{height:6px;background:var(--sf2);border-radius:3px;margin-bottom:8px;overflow:hidden}
  .meter-fill{height:100%;background:var(--gn);border-radius:3px;transition:width 50ms;width:0%}

  /* Results */
  .results{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-bottom:60px;-webkit-overflow-scrolling:touch}
  .card{background:var(--sf);border-radius:10px;padding:12px 14px;animation:fadeIn .25s ease-out}
  .card.ok{border-left:3px solid var(--gn)}
  .card.warn{border-left:3px solid var(--or)}
  .card.fail{border-left:3px solid var(--rd)}
  .card.new{border-left:3px solid var(--bl)}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .card-raw{font-size:10px;color:var(--txm);margin-bottom:4px}
  .card-parsed{display:flex;align-items:baseline;gap:8px}
  .card-field{font-size:14px;font-weight:700;color:var(--or)}
  .card-value{font-size:26px;font-weight:900;letter-spacing:-1px}
  .card-meta{font-size:10px;color:var(--txm);margin-top:4px}

  /* Empty */
  .empty{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--txm);font-size:13px;line-height:1.8;padding:20px}

  /* Controls */
  .controls{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--bd);padding:10px;display:flex;justify-content:center;gap:10px;max-width:480px;margin:0 auto}
  .btn{padding:12px 20px;border:1px solid var(--bd);border-radius:10px;background:var(--sf);color:var(--txd);font-size:13px;font-family:inherit;font-weight:700;cursor:pointer}
  .btn:active{background:var(--sf2)}
  .btn.primary{background:var(--or);color:#000;border-color:var(--or)}
  .btn.primary:active{background:var(--or);opacity:.8}
  .btn.stop{background:var(--rd);color:#fff;border-color:var(--rd)}
  .btn.disabled{opacity:.3;pointer-events:none}

  /* Toast */
  .toast{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%) scale(.9);background:rgba(0,0,0,.9);color:#fff;padding:16px 28px;border-radius:16px;font-size:20px;font-weight:700;z-index:100;opacity:0;pointer-events:none;transition:all .2s;text-align:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
  .toast .tf{color:var(--or);font-size:14px}
  .toast .tv{font-size:30px;margin-top:2px}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <h1>🍊 감귤조사 v4 — Whisper</h1>
    <div class="ver">Transformers.js 로컬 음성인식 | 네트워크 불필요</div>
  </div>

  <div class="model-status" id="modelStatus">
    ⏳ 모델을 로드하세요 (최초 1회 ~75MB 다운로드, 이후 캐시)
    <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
  </div>

  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="statusText">모델 로드 대기</span>
  </div>

  <div class="meter"><div class="meter-fill" id="meterFill"></div></div>

  <div class="results" id="results">
    <div class="empty" id="empty">
      아래 "모델 로드" 버튼을 먼저 누르세요<br>
      로드 완료 후 "시작"을 누르면<br>
      <strong>손대지 않고 계속 음성 입력</strong>할 수 있습니다
    </div>
  </div>
</div>

<div class="controls" id="controls">
  <button class="btn primary" id="btnLoad" onclick="window.loadModel()">📦 모델 로드</button>
  <button class="btn disabled" id="btnStart" onclick="window.toggleCapture()">🎤 시작</button>
  <button class="btn" onclick="window.clearResults()">🗑️</button>
  <button class="btn" onclick="window.exportLog()">📋</button>
</div>

<div class="toast" id="toast"><div class="tf" id="toastF"></div><div class="tv" id="toastV"></div></div>

<script type="module">
// ═══════════════════════════════════════════════════
// 1. 감귤 조사 항목 정의 + 퍼지매칭
// ═══════════════════════════════════════════════════
const FIELDS = {
  "조사나무":{type:"int",range:[1,100],unit:"번",short:"나무",
    aliases:["나무","나무번호","조사 나무","노사 나무","노사나무","노다 나무","조선 나무",
      "조사나 무비","나무가","나무는","나뭐","좌사나무","조산나무","노선 나무","조 바 나무"]},
  "조사과실":{type:"int",range:[1,50],unit:"번",short:"과실",
    aliases:["과실","과실번호","조사 과실","조 과실","사과 실","사과실","오타 과실",
      "교사 과실","과일","거실","좌사과실","조산과실","조사괴실","과실이","조사 과제",
      "조사가 실","조사 가시","과 일"]},
  "횡경":{type:"float",range:[10,120],unit:"mm",short:"횡",
    aliases:["변경","생경","황경","횡겨","횡견","행경","회경","훵경","횡격","횡겸",
      "형경","혈경","흉경","획경","횟경","횡경이","왱경","휑경","엔"]},
  "종경":{type:"float",range:[10,120],unit:"mm",short:"종",
    aliases:["존경","동경","존경액","존경의","존경이","정경",
      "종겨","종견","종격","종겸","종결","종경이","중경","총경","종교",
      "송","용"]},
  "과중":{type:"float",range:[30,500],unit:"g",short:null,
    aliases:["과종","과증","과준","괴중","가중","과충","과중이"]},
  "당도":{type:"float",range:[5,20],unit:"Brix",short:null,
    aliases:["당두","당돋","단도","당동","당독","당또","당토","담도"]},
  "산도":{type:"float",range:[0.3,3.0],unit:"%",short:null,
    aliases:["산돋","산동","삼도","선도","산또","잔도","상도"]},
  "착색":{type:"int",range:[1,10],unit:"",short:null,
    aliases:["착생","착섹","착쌕","착색이","칙색","탁색"]},
  "경도":{type:"float",range:[0.1,30],unit:"N",short:null,
    aliases:["경돋","견도","겸도","경독","껑도","격도"]},
  "과피두께":{type:"float",range:[0.5,10],unit:"mm",short:"과피",
    aliases:["과피","과피두게","과피두깨","과피 두께","꽈피두께"]},
  "비타민C":{type:"float",range:[10,100],unit:"mg",short:"비타민",
    aliases:["비타민씨","비타민시","비타민 씨","비타민","비타민c","피타민씨"]},
  "구연산":{type:"float",range:[0.1,3.0],unit:"%",short:null,
    aliases:["구연삼","구년산","구연산이","귀연산","구련산","규연산"]},
  "과즙량":{type:"float",range:[10,200],unit:"mL",short:"과즙",
    aliases:["과즙량이","과즙","과증량","과즙양","과즙 양"]},
  "씨수":{type:"int",range:[0,30],unit:"개",short:null,
    aliases:["씨수가","시수","씨 수","씨숫","씨쑤"]},
  "비고":{type:"text",range:null,unit:"",short:null,
    aliases:["비고란","메모","참고","노트","기타"]},
};

const KOREAN_DIGITS = {
  '일':1,'이':2,'삼':3,'사':4,'오':5,'육':6,'칠':7,'팔':8,'구':9,
  '영':0,'공':0,'길':1,'기':1,'위':2
};

function levenshtein(a,b){
  const m=a.length,n=b.length,d=Array.from({length:m+1},()=>Array(n+1).fill(0));
  for(let i=0;i<=m;i++)d[i][0]=i;for(let j=0;j<=n;j++)d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    d[i][j]=a[i-1]===b[j-1]?d[i-1][j-1]:1+Math.min(d[i-1][j],d[i][j-1],d[i-1][j-1]);
  return d[m][n];
}
function sim(a,b){const m=Math.max(a.length,b.length);return m===0?1:1-levenshtein(a,b)/m}

function matchField(input){
  const c=input.trim().toLowerCase();
  let best=null,bestS=0;
  for(const[f,m]of Object.entries(FIELDS)){
    if(c===f.toLowerCase())return{field:f,score:1,method:"exact"};
    if(m.short&&c===m.short.toLowerCase())return{field:f,score:.99,method:"short"};
    for(const a of m.aliases)if(c===a.toLowerCase())return{field:f,score:.98,method:"alias"};
    const s1=sim(c,f.toLowerCase());if(s1>bestS){bestS=s1;best={field:f,score:s1,method:"fuzzy"}}
    if(m.short){const ss=sim(c,m.short.toLowerCase());if(ss>bestS){bestS=ss;best={field:f,score:ss,method:"fuzzy-short"}}}
    for(const a of m.aliases){const s2=sim(c,a.toLowerCase());if(s2>bestS){bestS=s2;best={field:f,score:s2,method:"fuzzy-alias"}}}
  }
  return best&&best.score>=.5?best:{field:input,score:0,method:"new"};
}

function koreanWordToNumber(w){
  if(!w)return null;const t=w.trim();
  if(KOREAN_DIGITS[t]!==undefined)return KOREAN_DIGITS[t];
  if(/^[\d]+\.?\d*$/.test(t))return parseFloat(t);
  const cl=t.replace(/\s/g,''),dm=cl.match(/^(.+)점(.+)$/);
  if(dm){const a=kc(dm[1]),b=kc(dm[2]);if(a!==null&&b!==null)return parseFloat(a+'.'+b)}
  return kc(cl);
}
function kc(s){
  const d={'영':0,'일':1,'이':2,'삼':3,'사':4,'오':5,'육':6,'칠':7,'팔':8,'구':9};
  if(d[s]!==undefined)return d[s];let r=0,c=0;
  for(const ch of s){if(d[ch]!==undefined)c=d[ch];else if(ch==='십'){r+=(c||1)*10;c=0}else if(ch==='백'){r+=(c||1)*100;c=0}else return null}
  r+=c;return r>0?r:null;
}

// 컨텍스트 상태: 항목만 인식되고 값이 없을 때 보관
let pendingField = null;

function parseUtterance(text){
  const t=text.trim().replace(/[.,!?。、]+$/,''); // 후행 구두점 제거
  if(!t)return null;

  const candidates=[];

  // 전략1: "항목 아라비아숫자"
  const p1=t.match(/^(.+?)\s+([\d]+\.?\d*)$/);
  if(p1){const m=matchField(p1[1]);candidates.push({rawField:p1[1],field:m.field,value:parseFloat(p1[2]),matchScore:m.score,matchMethod:m.method})}

  // 전략2: "항목 한국어숫자"
  const ws=t.split(/\s+/);
  if(ws.length>=2){
    const last=ws[ws.length-1],nv=koreanWordToNumber(last);
    if(nv!==null){const fp=ws.slice(0,-1).join(' '),m=matchField(fp);
      if(m.score>=.5)candidates.push({rawField:fp,field:m.field,value:nv,matchScore:m.score,matchMethod:m.method})}
  }

  // 전략3: 한국어숫자가 붙은 경우 "과실이"→과실+2
  for(const[kor,num]of Object.entries(KOREAN_DIGITS)){
    if(t.endsWith(kor)&&t.length>kor.length){const fp=t.slice(0,-kor.length).trim();
      if(fp.length>0){const m=matchField(fp);if(m.score>=.5)candidates.push({rawField:fp,field:m.field,value:num,matchScore:m.score+.001,matchMethod:m.method})}}}

  // 전략4: 3단어 이상 "조사 나무 일"
  if(ws.length>=3){
    const last=ws[ws.length-1],nv=koreanWordToNumber(last);
    if(nv!==null)for(let i=ws.length-1;i>=1;i--){
      const fp=ws.slice(0,i).join(' '),fj=ws.slice(0,i).join('');
      let m=matchField(fp);if(m.score>=.6){candidates.push({rawField:fp,field:m.field,value:nv,matchScore:m.score,matchMethod:m.method});break}
      m=matchField(fj);if(m.score>=.6){candidates.push({rawField:fj,field:m.field,value:nv,matchScore:m.score,matchMethod:m.method});break}
    }
  }

  // 전략5: 숫자만 → 이전 pendingField에 할당
  const numOnly=koreanWordToNumber(t);
  if(numOnly!==null){
    if(pendingField){
      const pf=pendingField;pendingField=null;
      return{rawField:`[이전:${pf}]`,field:pf,value:numOnly,matchScore:.95,matchMethod:"pending"};
    }
    candidates.push({rawField:null,field:null,value:numOnly,matchScore:0,matchMethod:"number-only"});
  }

  // 전략6: 항목만 (값 없음) → pendingField에 저장
  if(candidates.length===0){
    const m=matchField(t);
    if(m.score>=.6){pendingField=m.field;return{rawField:t,field:m.field,value:null,matchScore:m.score,matchMethod:"pending-set"};}
    return null;
  }

  candidates.sort((a,b)=>b.matchScore-a.matchScore);
  const best=candidates[0];
  if(best.field)pendingField=null; // 성공하면 pending 초기화
  return best;
}

function validateValue(f,v){
  const m=FIELDS[f];if(!m||!m.range)return{valid:true};
  const[min,max]=m.range;return v<min||v>max?{valid:false,warning:`범위 초과(${min}~${max})`}:{valid:true};
}

// ═══════════════════════════════════════════════════
// 2. Whisper 모델 로드 (Transformers.js)
// ═══════════════════════════════════════════════════
let transcriber = null;
let modelLoaded = false;

window.loadModel = async function(){
  const btn=document.getElementById('btnLoad');
  const ms=document.getElementById('modelStatus');
  const pf=document.getElementById('progFill');

  btn.textContent='⏳ 로딩중...';btn.classList.add('disabled');
  ms.className='model-status loading';
  ms.firstChild.textContent='📦 모델 다운로드 중... (최초 ~75MB, 이후 캐시)';

  try{
    const {pipeline,env} = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3');
    env.allowLocalModels=false;

    transcriber = await pipeline('automatic-speech-recognition','onnx-community/whisper-tiny',{
      dtype:'q8',
      device:'wasm',
      progress_callback:(p)=>{
        if(p.status==='progress'&&p.total){
          const pct=Math.round(p.loaded/p.total*100);
          pf.style.width=pct+'%';
          ms.firstChild.textContent=`📦 ${p.file||'모델'} ${pct}%`;
        }
        if(p.status==='ready'){pf.style.width='100%'}
      }
    });

    modelLoaded=true;
    ms.className='model-status ready';
    ms.innerHTML='✅ Whisper tiny 로드 완료 — 오프라인 음성인식 준비됨';
    btn.style.display='none';
    const bs=document.getElementById('btnStart');
    bs.classList.remove('disabled');
    setStatus('ok','모델 준비 완료 — "시작"을 누르세요');
  }catch(e){
    ms.className='model-status error';
    ms.innerHTML='❌ 모델 로드 실패: '+e.message;
    btn.textContent='📦 재시도';btn.classList.remove('disabled');
    setStatus('err','모델 로드 실패');
    console.error(e);
  }
};

// ═══════════════════════════════════════════════════
// 3. 오디오 캡처 + VAD (Voice Activity Detection)
// ═══════════════════════════════════════════════════
let audioCtx=null, capturing=false;
let audioBuffer=[], isVoiceActive=false, silenceFrames=0;
const VAD_THRESHOLD=0.015; // RMS threshold
const SILENCE_FRAMES=5;    // ~320ms at 4096/16000
const MIN_FRAMES=3;        // minimum utterance length ~190ms
const MAX_FRAMES=80;       // max ~5 seconds

let processingQueue=[];
let isProcessing=false;

window.toggleCapture = async function(){
  if(capturing){stopCapture();return}
  if(!modelLoaded){alert('모델을 먼저 로드하세요');return}

  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,channelCount:1}});

    // Safari iOS: AudioContext를 사용자 제스처 안에서 생성
    audioCtx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:16000});
    // Safari가 16kHz를 지원하지 않을 수 있음
    const actualRate=audioCtx.sampleRate;
    console.log('AudioContext sampleRate:',actualRate);

    const source=audioCtx.createMediaStreamSource(stream);
    const processor=audioCtx.createScriptProcessor(4096,1,1);
    source.connect(processor);
    processor.connect(audioCtx.destination);

    capturing=true;
    audioBuffer=[];isVoiceActive=false;silenceFrames=0;
    document.getElementById('btnStart').textContent='⏹ 중지';
    document.getElementById('btnStart').className='btn stop';
    const emp=document.getElementById('empty');if(emp)emp.style.display='none';
    setStatus('listen','🎙️ 듣고 있습니다 — 말씀하세요');

    processor.onaudioprocess=(e)=>{
      const input=e.inputBuffer.getChannelData(0);
      const samples=new Float32Array(input);

      // Resample if needed (Safari might give 48kHz instead of 16kHz)
      const resampled=actualRate!==16000?resample(samples,actualRate,16000):samples;

      // RMS level
      const rms=Math.sqrt(resampled.reduce((s,v)=>s+v*v,0)/resampled.length);
      updateMeter(rms);

      if(rms>VAD_THRESHOLD){
        // 음성 감지
        if(!isVoiceActive){isVoiceActive=true;audioBuffer=[]}
        silenceFrames=0;
        audioBuffer.push(new Float32Array(resampled));
      }else if(isVoiceActive){
        // 무음 구간
        audioBuffer.push(new Float32Array(resampled)); // 약간의 무음도 포함
        silenceFrames++;
        if(silenceFrames>=SILENCE_FRAMES){
          // 발화 종료
          if(audioBuffer.length>=MIN_FRAMES){
            const clip=concatBuffers(audioBuffer);
            enqueueClip(clip);
          }
          audioBuffer=[];isVoiceActive=false;silenceFrames=0;
        }
      }

      // 최대 길이 초과 시 강제 처리
      if(isVoiceActive&&audioBuffer.length>=MAX_FRAMES){
        const clip=concatBuffers(audioBuffer);
        enqueueClip(clip);
        audioBuffer=[];isVoiceActive=false;silenceFrames=0;
      }
    };

    // 스트림/프로세서 참조 저장
    window._stream=stream;window._processor=processor;window._source=source;
  }catch(e){
    setStatus('err','마이크 권한을 허용해주세요');
    console.error(e);
  }
};

function stopCapture(){
  capturing=false;
  try{window._processor?.disconnect();window._source?.disconnect();
    window._stream?.getTracks().forEach(t=>t.stop());audioCtx?.close()}catch(e){}
  document.getElementById('btnStart').textContent='🎤 시작';
  document.getElementById('btnStart').className='btn primary';
  setStatus('ok','중지됨');
  updateMeter(0);
}

function resample(data,fromRate,toRate){
  const ratio=fromRate/toRate;
  const newLen=Math.round(data.length/ratio);
  const result=new Float32Array(newLen);
  for(let i=0;i<newLen;i++){
    const srcIdx=i*ratio;
    const lo=Math.floor(srcIdx),hi=Math.min(lo+1,data.length-1);
    const frac=srcIdx-lo;
    result[i]=data[lo]*(1-frac)+data[hi]*frac;
  }
  return result;
}

function concatBuffers(bufs){
  const len=bufs.reduce((s,b)=>s+b.length,0);
  const out=new Float32Array(len);let off=0;
  for(const b of bufs){out.set(b,off);off+=b.length}
  return out;
}

// ═══════════════════════════════════════════════════
// 4. 처리 큐 (순차 처리)
// ═══════════════════════════════════════════════════
function enqueueClip(audio){
  processingQueue.push(audio);
  if(!isProcessing)processNext();
}

async function processNext(){
  if(processingQueue.length===0){isProcessing=false;return}
  isProcessing=true;
  const clip=processingQueue.shift();
  setStatus('proc','🔄 인식 중...');

  try{
    const result=await transcriber(clip,{language:'korean',task:'transcribe'});
    const text=result.text?.trim();
    console.log('Whisper:',text);
    if(text)handleTranscript(text);
  }catch(e){
    console.error('Whisper error:',e);
    addCard({raw:'(인식 오류)',field:null,value:null,status:'fail',message:e.message});
  }

  if(capturing)setStatus('listen','🎙️ 듣고 있습니다...');
  processNext(); // 다음 클립 처리
}

// ═══════════════════════════════════════════════════
// 5. 결과 처리
// ═══════════════════════════════════════════════════
const allResults=[];

function handleTranscript(text){
  const parsed=parseUtterance(text);

  if(!parsed){
    addCard({raw:text,field:null,value:null,status:'fail',message:'파싱 실패'});
    return;
  }

  // pending-set: 항목만 인식, 값 대기
  if(parsed.matchMethod==='pending-set'){
    addCard({raw:text,field:parsed.field,value:null,status:'warn',message:'값을 말씀해주세요...'});
    return;
  }

  let status='ok',message='';
  if(parsed.field&&parsed.value!==null){
    const v=validateValue(parsed.field,parsed.value);
    if(!v.valid){status='warn';message=v.warning}
    if(parsed.matchScore<.8&&parsed.matchMethod!=='pending'){
      status='warn';message=`"${parsed.rawField}" → "${parsed.field}" (${Math.round(parsed.matchScore*100)}%)`}
  }
  if(parsed.matchMethod==='new'){status='new';message='새 항목'}

  const entry={raw:text,field:parsed.field,value:parsed.value,
    matchScore:parsed.matchScore,matchMethod:parsed.matchMethod,status,message,ts:new Date()};
  allResults.push(entry);
  addCard(entry);

  // TTS + 진동 피드백
  if(parsed.field&&parsed.value!==null){
    try{navigator.vibrate(status==='ok'?[50]:[50,50,50])}catch(e){}
    speak(`${parsed.field}, ${parsed.value}`);
    showToast(parsed.field,parsed.value);
  }
}

// ═══════════════════════════════════════════════════
// 6. UI
// ═══════════════════════════════════════════════════
function setStatus(type,text){
  document.getElementById('dot').className='dot '+type;
  document.getElementById('statusText').textContent=text;
}

function updateMeter(rms){
  const pct=Math.min(rms*500,100); // scale up for visibility
  document.getElementById('meterFill').style.width=pct+'%';
  document.getElementById('meterFill').style.background=rms>VAD_THRESHOLD?'var(--or)':'var(--gn)';
}

function addCard(e){
  const emp=document.getElementById('empty');if(emp)emp.style.display='none';
  const area=document.getElementById('results');
  const div=document.createElement('div');
  div.className='card '+(e.status||'');
  let h=`<div class="card-raw">🎙️ "${e.raw}"</div>`;
  if(e.field&&e.value!==null){
    h+=`<div class="card-parsed"><span class="card-field">${e.field}</span><span class="card-value">${e.value}</span></div>`;
  }else if(e.field){
    h+=`<div class="card-parsed"><span class="card-field">${e.field}</span><span class="card-value" style="font-size:14px;color:var(--txd)">값 대기중...</span></div>`;
  }
  if(e.message)h+=`<div class="card-meta">${e.message}</div>`;
  if(e.matchMethod)h+=`<div class="card-meta" style="color:var(--txm)">${e.matchMethod} ${e.matchScore?Math.round(e.matchScore*100)+'%':''}</div>`;
  div.innerHTML=h;
  area.insertBefore(div,area.firstChild);
  // 최대 50개
  while(area.children.length>50)area.removeChild(area.lastChild);
}

function showToast(f,v){
  const t=document.getElementById('toast');
  document.getElementById('toastF').textContent=f;
  document.getElementById('toastV').textContent=v;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1200);
}

function speak(text){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);u.lang='ko-KR';u.rate=1.2;
  window.speechSynthesis.speak(u);
}

window.clearResults=function(){
  allResults.length=0;pendingField=null;
  document.getElementById('results').innerHTML='<div class="empty" id="empty">결과가 초기화되었습니다</div>';
};

window.exportLog=function(){
  if(!allResults.length){alert('기록 없음');return}
  const lines=allResults.map(r=>`${r.ts?.toLocaleTimeString('ko-KR')||'-'}\t${r.raw}\t→\t${r.field||'?'}\t${r.value??'?'}\t(${r.matchMethod},${Math.round((r.matchScore||0)*100)}%)`);
  const text=lines.join('\n');
  if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>alert('복사됨'));
  else{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('복사됨')}
};
</script>
